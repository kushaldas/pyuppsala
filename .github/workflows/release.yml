name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
env:
  FORCE_COLOR: "1"
  UV_LINK_MODE: "copy"
jobs:

  manylinux_x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5

    - name: Pull the manylinux image
      run: docker pull quay.io/pypa/manylinux_2_28_x86_64

    - name: Build the wheel inside manylinux container
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/io \
          quay.io/pypa/manylinux_2_28_x86_64 \
          /io/build-wheels.sh

    - name: Install UV and test
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv venv
        source .venv/bin/activate
        uv pip install pytest
        uv pip install ./dist/pyuppsala-*.whl
        pytest tests/ -vvv

    - name: Store wheels
      uses: actions/upload-artifact@v4
      with:
        name: pyuppsala_manylinux_x86_64
        path: dist/
        overwrite: true
        retention-days: 3
        if-no-files-found: "error"
        compression-level: 0

  #manylinux_aarch64:
